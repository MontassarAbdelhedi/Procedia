<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="stylesheet" href="css/tabler-icons.min.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/topBar.css">
  <link rel="stylesheet" href="css/leftBar.css">
  <link rel="stylesheet" href="css/rightBar.css">
  <link rel="stylesheet" href="css/canvas.css">
  <link rel="stylesheet" href="css/node.css">
  <link rel="stylesheet" href="css/settingsModal.css">
  <link rel="stylesheet" href="css/nodePicker.css">
  <link rel="stylesheet" href="css/notificationBar.css">
  <link rel="stylesheet" href="css/compList.css">
  <link rel="stylesheet" href="css/tipField.css">
  <link rel="stylesheet" href="css/colorPicker.css">
  <link rel="stylesheet" href="css/layerStack.css">
  <link rel="stylesheet" href="css/keyframe.css">
  <link rel="stylesheet" href="css/walkthrough.css">
</head>

<body>

  <!-- TOP BAR -->
  <div id="top-bar"></div>

  <!-- MIDDLE ROW -->
  <div id="mid-row">
    <div id="left-bar"></div>
    <div id="canvas-wrap">
      <div id="canvas-grid"></div>
      <div id="canvas-nodes"></div>
      <canvas id="node-graph"></canvas>
      <div id="edge-zone-left" class="edge-zone"></div>
      <div id="edge-zone-right" class="edge-zone"></div>
      <canvas id="minimap-canvas" width="160" height="100"></canvas>
    </div>
    <div id="right-bar"></div>
  </div>

  <!-- 1. CEP interface -->
  <script src="lib/CSInterface.js"></script>

  <!-- 1b. Error reporting (Sentry + screenshot + reporter) — vendored locally -->
  <script src="lib/sentry.bundle.min.js"
    integrity="sha384-KgfNZ/yPJH4C25ELk249/OmtPWiqwJxTf/Z5CMlCvdas3BGPSktVyCyXMGXg8vg5"
    crossorigin="anonymous"></script>
  <script src="lib/html2canvas.min.js"
    integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H"
    crossorigin="anonymous"></script>
  <script src="reporting/envSnapshot.js"></script>
  <script src="reporting/reporter.js"></script>

  <!-- 2. All remaining scripts loaded via manifest (data/scripts.json) -->
  <script src="ui/scriptLoader.js"></script>

</body>

</html>
