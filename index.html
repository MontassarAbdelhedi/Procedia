<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Procedia</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">

    <!-- Notification bar — hidden by default, shown via notificationBar.show() -->
    <div id="notification-bar">
      <span id="notification-message"></span>
      <button id="notification-dismiss">×</button>
    </div>

    <!-- Dev reload button -->
    <button id="reload-btn" onclick="window.location.reload()" title="Reload panel">⟳</button>

    <!-- Drag preview -->
    <div id="drag-preview"></div>

    <!-- Three-column layout -->
    <div id="columns">

      <!-- Left: Node list -->
      <div id="node-list">
        <div id="node-search-wrap">
          <input id="node-search" type="text" placeholder="Search nodes…" autocomplete="off" spellcheck="false">
          <button id="node-search-clear" title="Clear search">×</button>
        </div>
        <div id="node-categories"></div>
      </div>

      <!-- Center: Canvas -->
      <div id="canvas-column">
        <canvas id="main-canvas"></canvas>
        <canvas id="minimap-canvas"></canvas>
        <div id="node-picker" class="node-picker hidden">
          <input type="text" id="node-picker-search" placeholder="Search nodes..." autocomplete="off" spellcheck="false" />
          <div id="node-picker-list"></div>
        </div>
      </div>

      <!-- Right: Inspector -->
      <div id="inspector"></div>

    </div>
  </div>

  <script src="CSInterface.js"></script>
  <script src="bridge/evalBridge.js"></script>
  <script src="graph/graphState/store.js"></script>
  <script src="graph/graphState/lifecycle.js"></script>
  <script src="graph/nodes/nodeRegistry.js"></script>
  <script src="graph/nodes/categories/core/Comp.js"></script>
  <script src="graph/nodes/categories/layers/Text.js"></script>
  <script src="data/uuidGenerator.js"></script>
  <script src="graph/nodes/nodeGeometry.js"></script>
  <script src="graph/nodes/nodeRenderer.js"></script>
  <script src="graph/nodes/nodeHitTest.js"></script>
  <script src="graph/Wire/nodeState.js"></script>
  <script src="graph/Wire/wire.js"></script>
  <script src="graph/Wire/wireRenderer.js"></script>
  <script src="graph/canvas/viewport.js"></script>
  <script src="graph/canvas/renderer.js"></script>
  <script src="graph/canvas/input/labelEditor.js"></script>
  <script src="graph/canvas/input/input.js"></script>
  <script src="graph/canvas/index.js"></script>
  <script src="graph/canvas/minimap.js"></script>
  <script src="notifications/notificationBar.js"></script>
  <script src="polling/poller.js"></script>
  <script src="inspector/layerOrderList.js"></script>
  <script src="inspector/inspector.js"></script>
  <!-- ─── index.js split ──────────────────────────────────────────── -->
  <script src="ae/nodeOps.js"></script>
  <script src="ae/graphHooks.js"></script>
  <script src="flush/dirtyFlusher.js"></script>
  <script src="ui/nodeList.js"></script>
  <script src="ui/drag.js"></script>
  <script src="ui/nodePicker.js"></script>
  <script src="ui/keyboard.js"></script>
  <script src="index.js"></script>
</body>
</html>
